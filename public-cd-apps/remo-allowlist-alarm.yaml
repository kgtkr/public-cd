apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: remo-allowlist-alarm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: public-cd-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: remo-allowlist-alarm
  source:
    path: kgtkr/remo-allowlist-alarm
    repoURL: https://github.com/kgtkr/public-cd
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
