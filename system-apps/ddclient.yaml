apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ddclient
  namespace: argocd
  finalizers: []
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ddclient
  source:
    path: kgtkr/ddclient
    repoURL: https://github.com/kgtkr/public-cd
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
