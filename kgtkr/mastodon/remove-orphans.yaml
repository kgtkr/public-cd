apiVersion: batch/v1
kind: CronJob
metadata:
  name: remove-orphans
spec:
  schedule: "0  0  */5  *  *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          tolerations:
            - key: "kubernetes.kgtkr.net/unreliable"
              effect: "NoSchedule"
          containers:
            - image: tootsuite/mastodon
              name: app
              env:
                - name: S3_READ_TIMEOUT
                  value: "300"
              resources:
                requests:
                  cpu: "10m"
                  memory: "300Mi"
              args:
                - tootctl
                - media
                - remove-orphans
              envFrom:
                - secretRef:
                    name: mastodon-config
                - secretRef:
                    name: mastodon-secret
          restartPolicy: Never
