apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mastodon-config
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
    argocd.argoproj.io/sync-wave: "-2"
spec:
  encryptedData:
    SECRET_KEY_BASE: 
    OTP_SECRET: 
    VAPID_PRIVATE_KEY: 
    SMTP_PASSWORD: 
    AWS_ACCESS_KEY_ID: 
    AWS_SECRET_ACCESS_KEY: 
  template:
    data:
      RAILS_ENV: production
      SINGLE_USER_MODE: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASS: postgres
      LOCAL_DOMAIN: mstdn.kgtkr.net
      VAPID_PUBLIC_KEY: BFbSA1IIkfGMh7aJZYrdd0wpqLDDM3GW1EEGkAQCARnGmc-K1j16HtpUCkicDf_eIQG3Zsu4neUQNgL2uaMm5B4=
      SMTP_SERVER: smtp.sendgrid.net
      SMTP_PORT: "587"
      SMTP_FROM_ADDRESS: mstdn@kgtkr.net
      SMTP_LOGIN: apikey
      SMTP_DELIVERY_METHOD: smtp
      SMTP_AUTH_METHOD: plain
      SMTP_OPENSSL_VERIFY_MODE: peer
      SMTP_ENABLE_STARTTLS_AUTO: "true"
      S3_ENABLED: "true"
      S3_BUCKET: system
      S3_PROTOCOL: https
      S3_HOSTNAME: mstdn.kgtkr.net
      S3_ENDPOINT: http://minio:9000
      S3_SIGNATURE_VERSION: s3
      S3_REGION: us-east-1
      DEFAULT_LOCALE: ja
      ES_ENABLED: "true"
      ES_HOST: es
      ES_PORT: "9200"
