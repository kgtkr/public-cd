apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrations
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    spec:
      tolerations:
        - key: "kubernetes.kgtkr.net/unreliable"
          effect: "NoSchedule"
      containers:
        - image: ghcr.io/zhaofengli/attic
          name: attic
          args:
            - -f
            - /opt/attic/config.toml
            - --mode
            - db-migrations
          resources:
            requests:
              cpu: "100m"
              memory: "300Mi"
          envFrom:
            - secretRef:
                name: attic-secret
            - configMapRef:
                name: attic-env
          volumeMounts:
            - name: config-volume
              mountPath: /opt/attic/
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: attic-config
      restartPolicy: Never
