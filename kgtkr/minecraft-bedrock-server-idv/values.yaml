minecraft-bedrock:
  image:
    tag: 2024.11.0
  minecraftServer:
    serverName: "てけらの第五鯖まいくらわーるど"
    eula: "FALSE" # remove deployment
    version: "1.21.60.10"
    difficulty: "normal"
    whitelist: true
    whitelistUsers: "kgtkr,yunyuxu,masukanya77,NoahMizuki0916,mahi1745,Wasabi3713,NanayaAlice777,Ringosuneta,rizutapioka,syoking7428,Minamosan5698,milky mirai9541,N sakuyak,BANANYA476452"
    ops: "2535422252797141"
    serviceType: "LoadBalancer"
    levelSeed: "-8153070156624695908"
    tickDistance: "4"
  extraEnvs:
    - name: "ALLOW_LIST"
      value: "true"
  persistence:
    storageClass: "-"
    dataDir:
      enabled: true
      existingClaim: minecraft-data
  serviceAnnotations:
    metallb.universe.tf/allow-shared-ip: "true"
    metallb.universe.tf/address-pool: public-ips
    external-dns.alpha.kubernetes.io/hostname: mc-idv.kgtkr.net
  sidecarContainers: |
    - name: rclone
      image: rclone/rclone:1.65
      resources:
        requests:
          cpu: "10m"
          memory: "300Mi"
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            rclone -v sync /data/worlds minio:/worlds --fast-list
            sleep 1h
          done
      volumeMounts:
        - mountPath: /config/rclone
          name: minio-secret
          readOnly: true
        - mountPath: /data
          name: datadir
          readOnly: true
  extraVolumes:
    - volumes:
        - name: minio-secret
          secret:
            secretName: minio-secret
