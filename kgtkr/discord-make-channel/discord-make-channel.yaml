apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: discord-make-channel
  name: discord-make-channel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: discord-make-channel
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: discord-make-channel
    spec:
      containers:
        - image: ghcr.io/kgtkr/discord-make-channel:20221003083510781-9d8eacd
          name: discord-make-channel
          resources:
            requests:
              cpu: "10m"
              memory: "15Mi"
          envFrom:
            - secretRef:
                name: app-secret
      restartPolicy: Always
