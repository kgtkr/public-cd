apiVersion: v1
kind: Service
metadata:
  name: client
spec:
  ports:
    - port: 3000
  selector:
    app.kubernetes.io/name: client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: client
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: client
    spec:
      containers:
        - image: ghcr.io/kgtkr/anontown-client:20240210114808699-3a4cc2c
          name: client
          resources:
            requests:
              cpu: "10m"
              memory: "100Mi"
          envFrom:
            - configMapRef:
                name: anontown-config
          env:
            - name: PORT
              value: "3000"
      restartPolicy: Always
