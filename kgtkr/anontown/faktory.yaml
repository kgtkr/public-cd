apiVersion: v1
kind: Service
metadata:
  name: faktory
spec:
  ports:
    - port: 7419
      name: faktory
    - port: 7420
      name: dashboard
  selector:
    app.kubernetes.io/name: faktory
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: faktory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: faktory
  serviceName: faktory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: faktory
    spec:
      containers:
        - image: contribsys/faktory:1.9.4
          name: faktory
          resources:
            requests:
              cpu: "10m"
              memory: "10Mi"
          volumeMounts:
            - mountPath: /var/lib/faktory/db
              name: faktory-data
              subPath: data
      restartPolicy: Always
      volumes:
        - name: faktory-data
          persistentVolumeClaim:
            claimName: faktory-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: faktory-data
  labels:
    recurring-job.longhorn.io/source: enabled
    recurring-job-group.longhorn.io/backup-weekly: enabled
    recurring-job.longhorn.io/snapshot: enabled
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
  volumeName: anontown-faktory
