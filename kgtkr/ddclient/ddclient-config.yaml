kind: SealedSecret
metadata:
  name: ddclient-config
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    password: 
  template:
    data:
      ddclient.conf: |
        daemon=60

        use=web
        ssl=yes
