apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: app
  name: app
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      nodeSelector:
        kubernetes.kgtkr.net/node-lan: home
      tolerations:
        - key: kubernetes.kgtkr.net/unreliable
          effect: NoSchedule
      containers:
        - image: ghcr.io/kgtkr/remo-allowlist-alarm:20231205020757865-18c82aa
          name: app
          resources:
            requests:
              cpu: "10m"
              memory: "15Mi"
          envFrom:
            - secretRef:
                name: app-secret
            - configMapRef:
                name: app-config
      restartPolicy: Always
