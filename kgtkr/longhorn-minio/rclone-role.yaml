apiVersion: v1
kind: ServiceAccount
metadata:
  name: rclone
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rclone
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rclone
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rclone
subjects:
  - kind: ServiceAccount
    name: rclone
