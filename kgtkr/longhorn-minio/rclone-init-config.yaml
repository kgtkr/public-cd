apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: rclone-init-config
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    clientId: 
    clientSecret: 
    token: 
  template:
    data:
      config: |
        [minio]
        type = s3
        provider = Minio
        env_auth = false
        access_key_id = Fhv5pGFGYLjBCc
        secret_access_key = fZfT7gbT3sSeo7q4UPwX4phx
        region = us-east-1
        endpoint = http://minio:9000

        [gdrive]
        type = drive
        client_id = {{ index . "clientId" }}
        client_secret = {{ index . "clientSecret" }}
        scope = drive.appfolder
        root_folder_id = appDataFolder
        token = {{ index . "token" }}
        team_drive =
