apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      nodeSelector:
        kubernetes.kgtkr.net/node-lan: home
      tolerations:
        - key: kubernetes.kgtkr.net/unreliable
          effect: NoSchedule
      containers:
        - image: ghcr.io/kgtkr/discord-wake-up-bot:20220516001743174-1a56e54
          name: app
          resources:
            requests:
              cpu: "10m"
              memory: "15Mi"
          volumeMounts:
            - mountPath: /etc/discord-wake-up-bot
              name: app-config
              readOnly: true
          env:
            - name: CONFIG_DIR
              value: /etc/discord-wake-up-bot
            - name: TZ
              value: Asia/Tokyo
      restartPolicy: Always
      volumes:
        - name: app-config
          secret:
            secretName: app-config
