apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      containers:
        - image: ghcr.io/kgtkr/nature-remo-temperature-adjuster:20220920150658421-a54e138
          name: app
          envFrom:
            - secretRef:
                name: app-secret
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: "10m"
              memory: "200Mi"
      restartPolicy: Always
